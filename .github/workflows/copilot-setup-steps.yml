name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual testing from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This job MUST be named `copilot-setup-steps` to be picked up by Copilot cloud agent.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js (webapp-simple is Node/Express) ──────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: src/webapp-simple/package.json

      - name: Install Node.js dependencies
        working-directory: src/webapp-simple
        run: npm ci

      # ── Azure CLI ────────────────────────────────────────────────────────
      - name: Install / upgrade Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az version

      # ── PowerShell ───────────────────────────────────────────────────────
      - name: Install PowerShell
        run: |
          sudo apt-get update -y
          sudo apt-get install -y powershell
          pwsh --version

      # ── jq (used in validation scripts) ─────────────────────────────────
      - name: Install jq
        run: |
          sudo apt-get install -y jq
          jq --version
